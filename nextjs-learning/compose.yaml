services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recipe_app
    ports:
      - '5454:5432'
    volumes:
      - db-data:/var/lib/postgresql

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - '8088:8080'
    depends_on:
      - db

volumes:
  db-data: